# Cloudflare Workers (Static Assets) configuration.
# `wrangler deploy` serves the static Astro build from ./dist via the ASSETS
# binding, and routes POST /api/contact to the Worker (see worker/index.ts).

name = "porti"
main = "worker/index.ts"
compatibility_date = "2024-11-01"

[assets]
directory = "./dist"
binding = "ASSETS"
# Serve 404.html (generated by Astro) for unknown paths.
not_found_handling = "404-page"

# Optional contact-form integration — set these as encrypted secrets in the
# Cloudflare dashboard (Settings → Variables and Secrets), not here:
#   CONTACT_WEBHOOK   a Discord/Slack/Make webhook to receive submissions
#   RESEND_API_KEY    to send the message as an email via Resend
#   CONTACT_TO        destination email (defaults to mondaini.contato@gmail.com)
