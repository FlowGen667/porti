<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="18%" r="55%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="92%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g font-family="'Inter', system-ui, sans-serif">
    <text x="80" y="150" font-family="'JetBrains Mono', monospace" font-size="26"
      fill="#22d3ee" letter-spacing="3">@mondainidev_</text>

    <text x="80" y="265" font-size="78" font-weight="800" fill="#ededf2">Gabriel Mondaini</text>

    <text x="80" y="345" font-size="40" font-weight="700" fill="url(#g)">Full Stack Developer</text>

    <text x="80" y="420" font-size="30" fill="#a9a9bd">Performance · Automation · Modern Web Experiences</text>

    <g transform="translate(80, 500)" font-family="'JetBrains Mono', monospace" font-size="22" fill="#a9a9bd">
      <rect x="0" y="-30" width="120" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="60" y="0" text-anchor="middle">Astro</text>
      <rect x="140" y="-30" width="120" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="200" y="0" text-anchor="middle">React</text>
      <rect x="280" y="-30" width="150" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="355" y="0" text-anchor="middle">Next.js</text>
      <rect x="450" y="-30" width="170" height="46" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="535" y="0" text-anchor="middle">Cloudflare</text>
    </g>
  </g>

  <text x="1120" y="120" text-anchor="end" font-family="'JetBrains Mono', monospace"
    font-size="120" font-weight="800" fill="url(#g)" opacity="0.9">GM</text>
</svg>
